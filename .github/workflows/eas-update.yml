name: EAS Update (OTA)

on:
  push:
    branches:
      - staging
      - master
    paths:
      - 'apps/expo/**'
      - 'packages/**'

jobs:
  update:
    name: Publish OTA Update
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish update (staging)
        if: github.ref == 'refs/heads/staging'
        run: eas update --channel preview --message "${{ github.event.head_commit.message }}" --non-interactive
        working-directory: apps/expo

      - name: Publish update (production)
        if: github.ref == 'refs/heads/master'
        run: eas update --channel production --message "${{ github.event.head_commit.message }}" --non-interactive
        working-directory: apps/expo
